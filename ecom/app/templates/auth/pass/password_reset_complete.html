{% extends "base.html" %}
{% block title %}Password Reset Successful | E-Shopper{% endblock %}

{% block content %}
<section style="padding:80px 0;background:#f5f5f5;">
  <div class="container">
    <div class="row">
      <div class="col-sm-6 col-sm-offset-3">
        <div style="
          background:#fff;
          padding:40px;
          text-align:center;
          border-radius:4px;
          box-shadow:0 0 8px rgba(0,0,0,0.1);
        ">
          <i class="fa fa-check-circle"
             style="font-size:50px;color:#28a745;"></i>

          <h3 style="margin-top:20px;">
            Password Reset Successful
          </h3>

          <p style="color:#777;">
            You can now login using your new password.
          </p>

          <a href="{% url 'user_login' %}" class="btn"
             style="background:#FE980F;color:#fff;margin-top:15px;">
            Login Now
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
