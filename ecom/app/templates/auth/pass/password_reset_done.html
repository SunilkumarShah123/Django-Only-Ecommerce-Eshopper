{% extends "base.html" %}
{% block title %}Email Sent | E-Shopper{% endblock %}

{% block content %}
<section style="padding:80px 0;background:#f5f5f5;">
  <div class="container">
    <div class="row">
      <div class="col-sm-6 col-sm-offset-3">
        <div style="
          background:#fff;
          padding:40px;
          text-align:center;
          border-radius:4px;
          box-shadow:0 0 8px rgba(0,0,0,0.1);
        ">
          <i class="fa fa-envelope"
             style="font-size:48px;color:#FE980F;"></i>

          <h3 style="margin-top:20px;">
            Check Your Email
          </h3>

          <p style="color:#777;">
            We have sent a password reset link to your email address.
          </p>

          <a href="{% url 'home' %}" class="btn"
             style="background:#FE980F;color:#fff;margin-top:15px;">
            Go to Home
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
