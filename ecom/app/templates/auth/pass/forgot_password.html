{% extends "base.html" %}
{% block title %}Forgot Password | E-Shopper{% endblock %}

{% block content %}
<section style="padding:60px 0;background:#f5f5f5;">
  <div class="container">
    <div class="row">
      <div class="col-sm-4 col-sm-offset-4">
        <div style="
          background:#fff;
          padding:30px;
          border-radius:4px;
          box-shadow:0 0 8px rgba(0,0,0,0.1);
        ">
          <h3 class="text-center" style="margin-bottom:20px;">
            <i class="fa fa-lock"></i> Forgot Password
          </h3>

          <p class="text-center" style="color:#777;">
            Enter your registered email address
          </p>

          <form method="post">
            {% csrf_token %}

            <div class="form-group">
              {{ form.email.label_tag }}
              {{ form.email }}
            </div>

            <button type="submit" class="btn btn-block"
              style="background:#FE980F;color:#fff;">
              Send Reset Link
            </button>
          </form>

          <div class="text-center" style="margin-top:15px;">
            <a href="{% url 'user_login' %}">
              Back to Login
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
