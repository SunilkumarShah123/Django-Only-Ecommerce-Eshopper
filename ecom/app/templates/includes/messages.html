{% if messages %}
<script>
  // 🔧 Global Alertify config
  alertify.set('notifier','position', 'top-right');

  // Save default delay
  var defaultDelay = alertify.get('notifier','delay');

  // Set custom delay (seconds)
  alertify.set('notifier','delay', 4);

  {% for message in messages %}
    {% if message.tags == 'success' %}
      alertify.success("{{ message|escapejs }}");
    {% elif message.tags == 'error' %}
      alertify.error("{{ message|escapejs }}");
    {% elif message.tags == 'warning' %}
      alertify.warning("{{ message|escapejs }}");
    {% else %}
      alertify.message("{{ message|escapejs }}");
    {% endif %}
  {% endfor %}

  // Restore original delay
  alertify.set('notifier','delay', defaultDelay);
</script>
{% endif %}
